<p class="lead text-muted">Click the product to view details</p>
<div class="container mt-4">

  <!-- Search Bar -->
  <div class="mb-3">
    <input 
      type="text" 
      class="form-control" 
      placeholder="Search by name, category, or price" 
      [(ngModel)]="searchTerm"
    />
  </div>

  <!-- Product List -->
  <ul class="list-group">
    <li 
      *ngFor="let product of getFilteredProducts()"
      class="list-group-item d-flex justify-content-between align-items-center"
      style="cursor: pointer;"
      [routerLink]="['/products', product.id, 'details']"
    >
      <div>
        <h5 class="mb-1">{{ product.name }}</h5>
        <p class="mb-0">
          Category: {{ product.category }} | 
          Price: ₱{{ product.price }} | 
          Stock: {{ product.stock }} | 
          Status: {{ product.status }}
        </p>
      </div>
      <span class="badge bg-primary rounded-pill">{{ product.rating }} ★</span>
    </li>
  </ul>

  <!-- No Results -->
  <div *ngIf="getFilteredProducts().length === 0" class="text-center mt-3 text-muted">
    No products found.
  </div>

</div>
